<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD DISCIPLES - T-Shirt Store</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">MAD DISCIPLES</div>
        <ul class="nav-links">
            <li><a href="#shop">Shop</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>MAD DISCIPLES</h1>
    <p>Express Your Style</p>
</section>

<!-- SHOP -->
<section id="shop" class="shop-section">

<div class="container">

<h2>Order Your T-Shirt</h2>

<form id="tshirtForm" class="form-container">

<!-- PERSONAL -->
<div class="form-section">
<h3>Personal Info</h3>

<div class="form-row">
<input type="text" id="firstName" placeholder="First Name">
<input type="text" id="lastName" placeholder="Last Name">
</div>

<div class="form-row">
<input type="email" id="email" placeholder="Email">
<input type="tel" id="phone" placeholder="Phone">
</div>
</div>

<!-- ORDER -->
<div class="form-section">
<h3>Order Details</h3>

<div class="form-row">
<select id="size">
<option value="">Select Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input type="number" id="quantity" value="1" min="1">
</div>

<!-- COLOR -->
<div class="form-row">
<label><input type="radio" name="color" value="Black"> Black</label>
<label><input type="radio" name="color" value="White"> White</label>
<label><input type="radio" name="color" value="Red"> Red</label>
</div>

<textarea id="specialRequest" placeholder="Special Requests"></textarea>

</div>

<button type="submit" class="btn">Place Order</button>

<p id="tshirtMessage"></p>

</form>

<!-- WHATSAPP BUTTON -->
<a href="#" id="orderWhatsAppBtn" class="whatsapp-button">
Order on WhatsApp 📲
</a>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact-section">

<div class="container">

<h2>Contact Admin</h2>

<form id="contactForm">

<input type="text" id="contactName" placeholder="Name">
<input type="email" id="contactEmail" placeholder="Email">
<input type="text" id="subject" placeholder="Subject">
<textarea id="message" placeholder="Message"></textarea>

<button type="submit" class="btn">Send Message</button>

</form>

<!-- MOBILE NUMBERS -->
<div class="form-row">
    <div class="form-group">
        <label>Primary</label>
        <a href="tel:0725820929" class="mobile-link">📞 0725820929</a>
    </div>

    <div class="form-group">
        <label>Secondary</label>
        <a href="tel:0711729501" class="mobile-link">📞 0711729501</a>
    </div>
</div>

<p class="admin-note">
Orders handled by 2 admins: 0725820929 / 0711729501
</p>

</div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
    <p>© 2026 Mad Disciples Ent. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
    emailjs.init("YOUR_PUBLIC_KEY");
})();
</script>

<script src="script.js"></script>
</body>
</html>
