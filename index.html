<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD DISCIPLES - T-Shirt Order & Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MAD DISCIPLES</h1>
        <p>Engage, Vibe, and Get Your Gear!</p>
    </header>

    <main>
        <section id="order">
            <h2>Order Your T-Shirt</h2>
            <form id="orderForm" action="mailto:jontychampee11@gmail.com?subject=T-Shirt Order" method="post" enctype="text/plain">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="size">Size:</label>
                <select id="size" name="size" required>
                    <option value="">Select Size</option>
                    <option value="S">Small</option>
                    <option value="M">Medium</option>
                    <option value="L">Large</option>
                    <option value="XL">Extra Large</option>
                </select>

                <label for="color">Color:</label>
                <select id="color" name="color" required>
                    <option value="">Select Color</option>
                    <option value="Black">Black</option>
                    <option value="White">White</option>
                    <option value="Red">Red</option>
                    <option value="Blue">Blue</option>
                </select>

                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" min="1" required>

                <button type="submit">Order Now</button>
            </form>
        </section>

        <section id="contact">
            <h2>Contact Admin</h2>
            <form id="contactForm" action="mailto:jontychampee11@gmail.com?subject=Contact from MAD DISCIPLES Site" method="post" enctype="text/plain">
                <label for="contactName">Name:</label>
                <input type="text" id="contactName" name="contactName" required>

                <label for="contactEmail">Email:</label>
                <input type="email" id="contactEmail" name="contactEmail" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MAD DISCIPLES. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
